<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --black:#080810;
  --deep:#0e0e18;
  --panel:#13131e;
  --blood:#a02808;
  --orange:#d96a10;
  --glow:#f5a028;
  --parchment:#cdb98a;
  --muted:#3a2e22;
}

body{background:var(--black);color:var(--parchment);
  font-family:'IM Fell English',serif;min-height:100vh;overflow-x:hidden}

/* stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(1px 1px at 8% 10%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 35%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 35% 5%,rgba(255,255,255,.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 22%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 8%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 82% 18%,rgba(255,255,255,.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 45%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 12% 65%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 75%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 45% 88%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 93% 88%,rgba(255,255,255,.5) 0%,transparent 100%)}

/* header */
header{position:relative;z-index:1;text-align:center;padding:2rem 1rem 1rem}

.moon{width:58px;height:58px;background:radial-gradient(circle at 36% 32%,#fff8dc,#d8c860);
  border-radius:50%;margin:0 auto .5rem;
  box-shadow:0 0 30px 8px rgba(220,200,80,.18);position:relative}
.moon-rider{position:absolute;left:50%;bottom:-4px;transform:translateX(-50%);
  width:84px;height:84px;pointer-events:none;
  animation:bob 3.6s ease-in-out infinite}
.moon-figure{position:absolute;left:50%;bottom:2px;transform:translateX(-50%);
  width:66px;height:auto}
.broom{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
  width:56px;height:auto}
@keyframes bob{
  0%,100%{transform:translateX(-50%) translateY(0) rotate(-2deg)}
  50%{transform:translateX(-50%) translateY(-4px) rotate(2deg)}}

h1{font-family:'Creepster',cursive;font-size:clamp(2rem,7vw,4rem);
  color:var(--orange);text-shadow:0 0 20px var(--blood),0 0 50px rgba(160,40,8,.5);
  letter-spacing:.05em;line-height:1.1}
.subhead{font-style:italic;color:#e0a84e;font-size:clamp(.78rem,1.6vw,.95rem);
  margin-top:.3rem;letter-spacing:.07em;
  text-shadow:0 0 10px rgba(245,165,45,.5)}

/* calendar */
.cal-wrap{position:relative;z-index:1;max-width:880px;margin:1.2rem auto 3rem;padding:0 .75rem}

.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.dow-cell{text-align:center;font-family:'Creepster',cursive;
  font-size:clamp(.6rem,1.4vw,.82rem);color:var(--blood);
  letter-spacing:.06em;padding:.2rem 0}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

.cal-empty{background:transparent;border-radius:8px;min-height:100px}

.cal-day{background:var(--panel);border:1px solid #1e1a28;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;
  padding:.35rem .15rem .3rem;cursor:pointer;position:relative;
  transition:border-color .15s,background .15s;min-height:100px;gap:2px;
  -webkit-tap-highlight-color:transparent}
.cal-day:hover{border-color:var(--blood);background:#1a1424}
.cal-day.is-today{border-color:var(--orange)}
.cal-day.opened{cursor:default;background:#0f0d0a;border-color:#1e1810}
.cal-day.opened:hover{border-color:#1e1810;background:#0f0d0a}
.cal-day.is-halloween{border-color:#6b0000}

.day-num{font-family:'Creepster',cursive;font-size:clamp(.72rem,1.8vw,.95rem);
  color:var(--blood);line-height:1;align-self:flex-start;padding-left:.3rem}
.cal-day.is-today .day-num{color:var(--glow)}

.pumpkin-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%}
.cell-pump{width:clamp(40px,8vw,62px);height:auto;display:block;
  filter:brightness(.45) saturate(.55);transition:filter .3s}
.cal-day.opened .cell-pump{filter:brightness(1) saturate(1.05)
  drop-shadow(0 0 6px rgba(245,150,30,.6))}

.day-movie{font-style:italic;font-size:clamp(.42rem,.9vw,.58rem);
  color:#6a8a4a;text-align:center;line-height:1.2;max-width:98%;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;min-height:1.3em}

@media(max-width:520px){
  .cal-empty,.cal-day{min-height:72px}
  .cal-day{padding:.25rem .1rem .2rem}
  .day-movie{display:none}
}
@media(max-width:360px){.cal-empty,.cal-day{min-height:56px}}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;z-index:200;
  background:rgba(4,4,10,.92);align-items:center;justify-content:center;
  backdrop-filter:blur(4px)}
.overlay.active{display:flex}

.modal{position:relative;display:flex;flex-direction:column;
  align-items:center;gap:.7rem;padding:1rem}

.modal-date-label{font-family:'Creepster',cursive;font-size:1.4rem;
  color:var(--blood);letter-spacing:.07em}

/* ── STAGE ── */
.stage{position:relative;width:320px;height:460px;margin:0 auto;overflow:hidden}

/* inner glow that turns on only at the end */
.glow{position:absolute;left:50%;bottom:96px;transform:translateX(-50%);
  width:230px;height:210px;border-radius:50%;z-index:1;
  background:radial-gradient(circle,rgba(245,165,45,.65) 0%,rgba(217,106,16,.25) 45%,transparent 72%);
  opacity:0;transition:opacity 1s}
.glow.on{opacity:1;animation:flicker 3s infinite}

/* pumpkin body — starts dim ("unlit"), brightens at the reveal.
   Once the face is cut out to transparency, the .glow layer behind
   shines through the eyes/mouth when .lit is added. */
.pumpkin{position:absolute;left:50%;bottom:24px;width:280px;height:auto;
  transform:translateX(-50%);z-index:3;
  filter:brightness(.55) saturate(.7);
  transition:filter 1s ease}
.pumpkin.lit{filter:brightness(1.05) saturate(1.12)
  drop-shadow(0 0 28px rgba(245,150,30,.78))}

/* scroll sits BEHIND the pumpkin (z<body) and rises up through the
   transparent area above the rim, so it reads as coming out of the opening */
.scroll-wrap{position:absolute;left:50%;bottom:205px;width:188px;z-index:2;
  transform:translateX(-50%) translateY(40px) scale(.7);opacity:0;
  transition:transform .85s cubic-bezier(.22,1,.36,1),opacity .6s;
  filter:drop-shadow(0 6px 10px rgba(0,0,0,.5))}
.scroll-wrap.up{transform:translateX(-50%) translateY(-55px) scale(1);opacity:1}
.scroll-img{width:100%;height:auto;display:block}
.scroll-text{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:0 26px;line-height:1.05}
.scroll-title{font-family:'IM Fell English',serif;font-weight:700;
  color:#2e1604;font-size:clamp(.8rem,3.4vw,1.05rem)}
.scroll-year{font-family:'IM Fell English',serif;font-style:italic;
  color:#6a3c18;font-size:.72rem;margin-top:2px}

/* lid caps the opening; --lid-y nudges it up to register with the body
   (will be 0 once the new body shares the lid's 600x570 canvas) */
.lid{position:absolute;left:50%;bottom:24px;width:280px;height:auto;
  --lid-y:-24px;
  transform:translateX(-50%) translateY(var(--lid-y));z-index:5;
  filter:brightness(.55) saturate(.7);
  transition:transform .7s cubic-bezier(.4,0,.2,1),opacity .6s}
.lid.off{transform:translateX(-50%) translateY(-430px) rotate(11deg);opacity:0}

/* hand (fist) descends from above; rotated so the fist points down.
   Default z-index:6 = IN FRONT (grabbing/lifting the lid).
   .behind drops it below the pumpkin body = reaching INSIDE. */
.hand{position:absolute;left:50%;top:-210px;width:150px;height:auto;z-index:6;
  transform:translateX(-50%) rotate(90deg);transform-origin:center;
  transition:top .85s cubic-bezier(.45,0,.25,1)}
.hand.behind{z-index:2}
.hand.open-hand{transform:translateX(-50%) rotate(-135deg)} /* open palm points straight down */
.hand.lid-grip{transform:translateX(calc(-50% - 18px)) rotate(15deg)} /* fist grips stem from the side, near-horizontal */
.hand.lid-reach{transform:translateX(calc(-50% - 18px)) rotate(135deg)} /* open hand reaching in to the stem (wrist left, fingers toward stem) */

.close-btn{font-family:'Creepster',cursive;background:var(--deep);
  color:var(--orange);border:1px solid var(--blood);
  padding:.4rem 1.4rem;font-size:1rem;border-radius:4px;cursor:pointer;
  letter-spacing:.07em;transition:background .15s,color .15s}
.close-btn:hover{background:var(--blood);color:#fff}

footer{position:relative;z-index:1;text-align:center;
  padding:1rem;color:#d29a52;font-style:italic;font-size:.85rem;
  text-shadow:0 0 8px rgba(245,160,40,.45)}

@keyframes flicker{
  0%,100%{opacity:1}45%{opacity:.62}50%{opacity:.9}55%{opacity:.45}70%{opacity:1}}
</style>
</head>

  for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
const MOVIES=seededShuffle(RAW);

// ── date context ───────────────────────────────────────────────────────────────
const now=new Date();
const isOct26=now.getFullYear()===2026&&now.getMonth()===9;
const todayDay=isOct26?now.getDate():0;
const START_DOW=new Date(2026,9,1).getDay(); // weekday of Oct 1 2026

// ── opened state ────────────────────────────────────────────────────────────────
const STORE='horror2026';
let openedDays=JSON.parse(localStorage.getItem(STORE)||'[]');

// ── build calendar ──────────────────────────────────────────────────────────────
const grid=document.getElementById('calGrid');
for(let i=0;i<START_DOW;i++){
  const e=document.createElement('div');e.className='cal-empty';grid.appendChild(e);
}
for(let d=1;d<=31;d++){
  const opened=openedDays.includes(d);
  const m=MOVIES[d-1];
  const cell=document.createElement('div');
  cell.className='cal-day'+(opened?' opened':'')+(d===todayDay?' is-today':'')+(d===31?' is-halloween':'');
  cell.dataset.day=d;
  cell.innerHTML=`<div class="day-num">${d}</div>
    <div class="pumpkin-wrap"><img class="cell-pump" src="${opened?FULL_LIT:FULL_SRC}" alt=""></div>
    <div class="day-movie">${opened?m.t:''}</div>`;
  if(!opened) cell.addEventListener('click',()=>triggerOpen(d));
  grid.appendChild(cell);
}

// ── modal elements ──────────────────────────────────────────────────────────────
const overlay   =document.getElementById('overlay');
const stage     =document.getElementById('stage');
const modalDate =document.getElementById('modalDate');
const glow      =document.getElementById('glow');
const pumpkin   =document.getElementById('pumpkin');
const scrollWrap=document.getElementById('scrollWrap');
const scrollImg =document.getElementById('scrollImg');
const lid       =document.getElementById('lid');
const hand      =document.getElementById('hand');
const sTitle    =document.getElementById('sTitle');
const sYear     =document.getElementById('sYear');
const closeBtn  =document.getElementById('closeBtn');

// wire embedded artwork
pumpkin.src=PUMP_SRC; lid.src=LID_SRC; hand.src=HAND_FIST; scrollImg.src=SCROLL_SRC;

function setFilm(title,year){ sTitle.textContent=title; sYear.textContent=year; }

// pending timers — cleared on reset so they don't fire across opens
let animTimers=[];
function clearTimers(){animTimers.forEach(clearTimeout);animTimers=[];}

const STEPPERS=[glow,pumpkin,scrollWrap,lid,hand];
function resetAnim(){
  clearTimers();
  STEPPERS.forEach(el=>el.style.transition='none');
  hand.style.top='-210px';
  hand.src=HAND_OPEN;
  hand.classList.remove('open-hand','lid-grip');
  hand.classList.add('lid-reach','behind');   // open hand reaches in BEHIND the pumpkin
  lid.classList.remove('off');
  scrollWrap.classList.remove('up');
  pumpkin.classList.remove('lit');
  glow.classList.remove('on');
  void stage.offsetWidth;                 // force reflow so the reset paints
  STEPPERS.forEach(el=>el.style.transition=''); // restore CSS transitions
}

function triggerOpen(day){
  const m=MOVIES[day-1];
  modalDate.textContent=`October ${day}`;
  setFilm(m.t,m.y);
  resetAnim();
  overlay.classList.add('active');

  /* Timeline:
       0.10s  hand descends to the lid
       1.10s  lid lifts off + hand rises carrying it away
       2.10s  hand descends again into the open pumpkin
       3.00s  scroll rises out with the title + hand rises away
       3.95s  pumpkin lights up (only after the paper is out)            */
  // 1. open hand reaches in sideways toward the stem
  animTimers.push(setTimeout(()=>{ hand.style.top='118px'; }, 100));
  // 2. fingers close on the stem: switch to fist AND pop to the FRONT (z-index) = the grab
  animTimers.push(setTimeout(()=>{ hand.src=HAND_FIST; hand.classList.remove('lid-reach','behind'); hand.classList.add('lid-grip'); }, 1000));
  // 3. lid lifts off; fist rises away carrying it
  animTimers.push(setTimeout(()=>{ lid.classList.add('off'); hand.style.top='-210px'; }, 1300));
  // 4. off-screen, open the hand for the reach inside
  animTimers.push(setTimeout(()=>{ hand.src=HAND_OPEN; hand.classList.remove('lid-grip'); hand.classList.add('open-hand'); }, 1850));
  // 5. open hand drops BEHIND the pumpkin, reaching inside
  animTimers.push(setTimeout(()=>{ hand.classList.add('behind'); hand.style.top='150px'; }, 2150));
  // 6. sneaky switch to the fist while hidden inside — "grabbed!"
  animTimers.push(setTimeout(()=>{ hand.src=HAND_FIST; hand.classList.remove('open-hand'); }, 3000));
  // 7. fist rises, pulling the scroll up out of the opening with it
  animTimers.push(setTimeout(()=>{ scrollWrap.classList.add('up'); hand.style.top='-210px'; }, 3150));
  // 8. pumpkin lights up (only after the paper is out)
  animTimers.push(setTimeout(()=>{ pumpkin.classList.add('lit'); glow.classList.add('on'); }, 4000));

  // mark opened + persist
  if(!openedDays.includes(day)){
    openedDays.push(day);
    localStorage.setItem(STORE,JSON.stringify(openedDays));
    const cell=document.querySelector(`.cal-day[data-day="${day}"]`);
    if(cell){
      cell.classList.add('opened');
      cell.querySelector('.cell-pump').src=FULL_LIT;   // swap to colored lit face
      cell.querySelector('.day-movie').textContent=m.t;
      cell.style.cursor='default';
      const fresh=cell.cloneNode(true);   // drop the click listener
      cell.replaceWith(fresh);
    }
  }
}

function closeModal(){overlay.classList.remove('active')}
closeBtn.addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
</script>
</body>
</html>
